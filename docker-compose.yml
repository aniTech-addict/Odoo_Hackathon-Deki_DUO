services:
    postgres-dev:
        image: postgres:16-alpine
        container_name: odoo-postgres-dev
        profiles: ['dev']
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: odoo_dev
        ports:
            - '5434:5432'
        volumes:
            - postgres_dev_data:/var/lib/postgresql/data

    postgres-prod:
        image: postgres:16-alpine
        container_name: odoo-postgres-prod
        profiles: ['prod']
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: odoo_prod
        ports:
            - '5433:5432'
        volumes:
            - postgres_prod_data:/var/lib/postgresql/data

volumes:
    postgres_dev_data:
    postgres_prod_data:
